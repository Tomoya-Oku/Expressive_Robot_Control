services:
  ros2:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        USER_UID: ${HOST_UID:-1000}
        USER_GID: ${HOST_GID:-1000}
    image: homework3-dobot-me6-ros2:humble
    pull_policy: never
    container_name: homework3-dobot-me6-ros2
    network_mode: host
    ipc: host
    privileged: true
    environment:
      DISPLAY: ${DISPLAY}
      QT_X11_NO_MITSHM: "1"
      ROS_DOMAIN_ID: ${ROS_DOMAIN_ID:-30}
      RMW_IMPLEMENTATION: ${RMW_IMPLEMENTATION:-rmw_fastrtps_cpp}
      DOBOT_TYPE: ${DOBOT_TYPE:-me6}
      IP_address: ${DOBOT_ME6_IP:-192.168.5.1}
      DOBOT_ME6_IP: ${DOBOT_ME6_IP:-192.168.5.1}
      DOBOT_ME6_DASHBOARD_PORT: ${DOBOT_ME6_DASHBOARD_PORT:-29999}
      DOBOT_ME6_MOTION_PORT: ${DOBOT_ME6_MOTION_PORT:-30003}
    volumes:
      - ./ros2_ws:/home/ros/ws
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    devices:
      - /dev:/dev
    working_dir: /home/ros/ws
