name: Homework-3 ROS 2 CI

on:
  push:
    branches:
      - main
    paths:
      - "Homework-3/**"
      - ".github/workflows/homework3-ros2-ci.yml"
  pull_request:
    paths:
      - "Homework-3/**"
      - ".github/workflows/homework3-ros2-ci.yml"
  workflow_dispatch:

jobs:
  build:
    name: Docker ROS 2 workspace build
    runs-on: ubuntu-22.04
    timeout-minutes: 45

    defaults:
      run:
        working-directory: Homework-3

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Docker versions
        run: |
          docker --version
          docker compose version

      - name: Build ROS 2 Docker image
        run: docker compose build

      - name: Resolve rosdep dependencies
        run: |
          docker compose run -T --rm ros2 bash -lc "\
            rosdep update && \
            rosdep install --from-paths src --ignore-src -r -y \
              --dependency-types buildtool \
              --dependency-types build \
              --dependency-types exec \
              --skip-keys 'message_generation warehouse_ros_mongo'"

      - name: Build Homework-3 ROS 2 packages
        run: |
          docker compose run -T --rm ros2 bash -lc "\
            colcon build --symlink-install \
              --packages-up-to \
              cra_description \
              dobot_rviz \
              dobot_gazebo \
              dobot_moveit \
              me6_moveit \
              cr_robot_ros2 \
              dobot_msgs_v4 \
              dobot_me6_bringup \
              dobot_me6_driver \
              dobot_me6_examples"

      - name: Python syntax check
        run: |
          docker compose run -T --rm ros2 bash -lc "\
            python3 -m py_compile \
              src/dobot_me6_bringup/launch/display.launch.py \
              src/dobot_me6_bringup/launch/fake_control.launch.py \
              src/dobot_me6_bringup/launch/gazebo.launch.py \
              src/dobot_me6_driver/launch/real_validation.launch.py \
              src/dobot_me6_examples/dobot_me6_examples/ee_control_common.py \
              src/dobot_me6_examples/dobot_me6_examples/ee_circle.py \
              src/dobot_me6_examples/dobot_me6_examples/ee_figure8.py \
              src/dobot_me6_examples/dobot_me6_examples/ee_line.py \
              src/dobot_me6_examples/dobot_me6_examples/ee_keyboard.py \
              src/dobot_me6_examples/dobot_me6_examples/ee_marker.py \
              src/dobot_me6_examples/dobot_me6_examples/send_joint_goal.py"
